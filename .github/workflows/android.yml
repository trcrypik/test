name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Gradle
      run: |
        GRADLEW_FILE=$(find . -name "gradlew" -type f | head -n 1)
        chmod +x "$GRADLEW_FILE"
        "$GRADLEW_FILE" assembleDebug --no-daemon
        
    - name: Debug Output
      run: |
        echo "Searching for files in build directory:"
        find . -name "build" -type d -exec ls -R {} +
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/*.apk"
        if-no-files-found: error
