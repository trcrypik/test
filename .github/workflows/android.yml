name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Debug Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew tasks --all
    - name: Build with Gradle
      run: |
        ./gradlew :app:assembleDebug --info
    - name: List Directory Structure
      run: ls -R
