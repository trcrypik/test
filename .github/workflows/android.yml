name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Gradle
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -type f | head -n 1)
        chmod +x "$GRADLEW_PATH"
        "$GRADLEW_PATH" assembleDebug --no-daemon
    - name: Debug Output
      run: |
        echo "ALL FILES:"
        find . -maxdepth 4
        echo "BUILD DIRECTORIES:"
        find . -name "build" -type d
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/app-debug.apk"
