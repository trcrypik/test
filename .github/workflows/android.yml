name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon --stacktrace --debug
    - name: Check for APK
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk"
        echo "Listing build output dir:"
        ls -R app/build/outputs/ || echo "Directory app/build/outputs/ does not exist"
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/
