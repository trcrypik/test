name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Gradle
      run: |
        if [ -f "gradlew" ]; then
          GRADLEW_PATH="./gradlew"
        elif [ -f "test_repo/gradlew" ]; then
          GRADLEW_PATH="./test_repo/gradlew"
        else
          echo "gradlew not found!"
          exit 1
        fi
        chmod +x $GRADLEW_PATH
        $GRADLEW_PATH assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/app-debug.apk"
