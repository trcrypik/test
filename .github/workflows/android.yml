name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Use Gradle 7.5
      # Используем gradle-wrapper, но принудительно переписываем его на 7.5
      run: |
        ./gradlew wrapper --gradle-version 7.5 --no-daemon
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
