name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew :app:assembleDebug --no-daemon
    - name: Locate APK
      run: |
        echo "Searching for APK:"
        find . -name "*.apk"
        echo "BUILD DIRECTORY STRUCTURE:"
        ls -R app/build/ || echo "Build directory not found"
