name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Gradle
      run: |
        cd test_repo
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: test_repo/app/build/outputs/apk/debug/app-debug.apk
